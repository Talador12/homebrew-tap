name: Update Formula

on:
  repository_dispatch:
    types: [formula-update]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update aoaoe formula
        run: |
          set -euo pipefail
          VERSION="${{ github.event.client_payload.version }}"
          VERSION="${VERSION#v}"

          URL="https://registry.npmjs.org/aoaoe/-/aoaoe-${VERSION}.tgz"
          TARBALL="$(mktemp)"
          curl -fsSL "$URL" -o "$TARBALL"
          test -s "$TARBALL"
          SHA=$(sha256sum "$TARBALL" | awk '{print $1}')
          rm -f "$TARBALL"

          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/aoaoe.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/aoaoe.rb

      - name: Commit and push
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/aoaoe.rb
          git commit -m "aoaoe ${VERSION}" || exit 0
          git push
